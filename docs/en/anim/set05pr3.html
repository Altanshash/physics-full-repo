<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Electric Field of Two Charges</title>

<style>
  body {
    text-align: center;
    font-family: Arial;
    background: #f5f7fa;
  }

  canvas {
    background: white;
    border: 2px solid black;
    margin-top: 20px;
  }
</style>
</head>

<body>

<h2>Electric Field from Two Charges</h2>
<p>Move your mouse to see the electric field vector</p>

<canvas id="canvas" width="700" height="500"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const k = 9e9;
const q1 = 2e-6;
const q2 = 4e-6;

const a = 100;

// positions (pixel)
const c1 = {x: 350 - a, y: 250};
const c2 = {x: 350 + a, y: 250};

let mouse = {x: 350, y: 150};

canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
  draw();
});

function field(q, cx, cy, px, py) {
  let dx = px - cx;
  let dy = py - cy;
  let r = Math.sqrt(dx*dx + dy*dy);

  if (r < 10) return {x:0,y:0};

  let E = k*q/(r*r);

  return {
    x: E * dx / r,
    y: E * dy / r
  };
}

function drawArrow(x,y,fx,fy) {
  let scale = 0.00005;

  let ex = x + fx*scale;
  let ey = y + fy*scale;

  let angle = Math.atan2(ey-y, ex-x);

  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(ex,ey);
  ctx.strokeStyle="green";
  ctx.lineWidth=3;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(ex,ey);
  ctx.lineTo(ex-10*Math.cos(angle-Math.PI/6), ey-10*Math.sin(angle-Math.PI/6));
  ctx.lineTo(ex-10*Math.cos(angle+Math.PI/6), ey-10*Math.sin(angle+Math.PI/6));
  ctx.closePath();
  ctx.fillStyle="green";
  ctx.fill();
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // charges
  ctx.beginPath();
  ctx.arc(c1.x,c1.y,20,0,Math.PI*2);
  ctx.fillStyle="red";
  ctx.fill();
  ctx.fillStyle="black";
  ctx.fillText("+q",c1.x-10,c1.y-25);

  ctx.beginPath();
  ctx.arc(c2.x,c2.y,20,0,Math.PI*2);
  ctx.fillStyle="orange";
  ctx.fill();
  ctx.fillStyle="black";
  ctx.fillText("+2q",c2.x-15,c2.y-25);

  // point
  ctx.beginPath();
  ctx.arc(mouse.x,mouse.y,5,0,Math.PI*2);
  ctx.fill();

  // fields
  let E1 = field(q1,c1.x,c1.y,mouse.x,mouse.y);
  let E2 = field(q2,c2.x,c2.y,mouse.x,mouse.y);

  let Ex = E1.x + E2.x;
  let Ey = E1.y + E2.y;

  drawArrow(mouse.x,mouse.y,Ex,Ey);

  // info
  ctx.fillText("E vector", mouse.x+10, mouse.y+10);
}

draw();
</script>

</body>
</html>
