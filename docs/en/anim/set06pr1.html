<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lorentz Force Animation</title>

<style>
    body {
        margin: 0;
        background: #111827;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
    }

    h1 {
        margin-top: 20px;
    }

    canvas {
        background: #ffffff;
        border: 3px solid #38bdf8;
        border-radius: 12px;
        margin-top: 15px;
    }

    .info {
        margin-top: 15px;
        font-size: 18px;
        line-height: 1.6;
    }

    button {
        margin: 10px;
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
    }

    #startBtn {
        background: #22c55e;
        color: white;
    }

    #stopBtn {
        background: #ef4444;
        color: white;
    }
</style>
</head>

<body>

<h1>Lorentz Force: Circular Motion</h1>

<canvas id="canvas" width="700" height="500"></canvas>

<div>
    <button id="startBtn">Start</button>
    <button id="stopBtn">Stop</button>
</div>

<div class="info">
    <b>Given:</b><br>
    B = (0, 0, 1) T<br>
    v = (2, 3, 0) m/s<br>
    q = 1 mC<br>
    m = 0.01 kg<br><br>

    <b>Result:</b><br>
    The charge moves in a circular path in the XY-plane.<br>
    Magnetic force does no work.
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");

// Physical values
const q = 1e-3;
const B = 1;
const m = 0.01;

const vx0 = 2;
const vy0 = 3;

const v = Math.sqrt(vx0 * vx0 + vy0 * vy0);
const omega = q * B / m;
const r = m * v / (q * B);

// Drawing scale
const scale = 5;
const R = r * scale;

// Canvas center
const cx = canvas.width / 2;
const cy = canvas.height / 2;

// Circle center for initial point at (0,0)
const centerX = cx - (vy0 / omega) * scale;
const centerY = cy - (vx0 / omega) * scale;

let t = 0;
let running = false;
let animationId;

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Axes
    ctx.strokeStyle = "#9ca3af";
    ctx.lineWidth = 1;

    ctx.beginPath();
    ctx.moveTo(0, cy);
    ctx.lineTo(canvas.width, cy);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(cx, 0);
    ctx.lineTo(cx, canvas.height);
    ctx.stroke();

    // Trajectory circle
    ctx.strokeStyle = "#2563eb";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(centerX, centerY, R, 0, 2 * Math.PI);
    ctx.stroke();

    // Position of particle
    const x = centerX + R * Math.sin(omega * t);
    const y = centerY + R * Math.cos(omega * t);

    // Particle
    ctx.fillStyle = "#dc2626";
    ctx.beginPath();
    ctx.arc(x, y, 9, 0, 2 * Math.PI);
    ctx.fill();

    // Velocity arrow
    const vx = vx0 * Math.cos(omega * t) + vy0 * Math.sin(omega * t);
    const vy = -vx0 * Math.sin(omega * t) + vy0 * Math.cos(omega * t);

    drawArrow(x, y, x + vx * 20, y - vy * 20, "#16a34a", "v");

    // Force arrow
    const Fx = q * vy * B;
    const Fy = -q * vx * B;

    drawArrow(x, y, x + Fx * 8000, y - Fy * 8000, "#f97316", "F");

    // Text
    ctx.fillStyle = "#111827";
    ctx.font = "16px Arial";

    ctx.fillText("Radius r ≈ 36.1 m", 20, 30);
    ctx.fillText("Angular frequency ω = 0.1 rad/s", 20, 55);
    ctx.fillText("Magnetic field B is along +z direction", 20, 80);

    ctx.fillText("Red dot: charge", 20, 420);
    ctx.fillText("Green arrow: velocity", 20, 445);
    ctx.fillText("Orange arrow: magnetic force", 20, 470);

    if (running) {
        t += 0.03;
        animationId = requestAnimationFrame(draw);
    }
}

function drawArrow(x1, y1, x2, y2, color, label) {
    const headLength = 12;
    const angle = Math.atan2(y2 - y1, x2 - x1);

    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = 4;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(
        x2 - headLength * Math.cos(angle - Math.PI / 6),
        y2 - headLength * Math.sin(angle - Math.PI / 6)
    );
    ctx.lineTo(
        x2 - headLength * Math.cos(angle + Math.PI / 6),
        y2 - headLength * Math.sin(angle + Math.PI / 6)
    );
    ctx.lineTo(x2, y2);
    ctx.fill();

    ctx.font = "18px Arial";
    ctx.fillText(label, x2 + 8, y2 + 8);
}

startBtn.onclick = function () {
    if (!running) {
        running = true;
        draw();
    }
};

stopBtn.onclick = function () {
    running = false;
    cancelAnimationFrame(animationId);
};

draw();
</script>

</body>
</html>
