<!DOCTYPE html>
<html>
<head>
<title>My Newton Motion</title>
</head>
<body style="background:black; color:white; text-align:center;">

<h2>My Simulation (Constant Force)</h2>

<canvas id="c" width="600" height="300" style="background:#111;"></canvas><br>
<button onclick="start()">Start</button>

<script>
let ctx = document.getElementById("c").getContext("2d");

let t = 0;
let dt = 0.05;

// initial conditions
let x0 = 0, y0 = 0;
let vx0 = 1, vy0 = -1;
let ax = 3, ay = 1;

function draw() {
let x = x0 + vx0*t + 0.5*ax*t*t;
let y = y0 + vy0*t + 0.5*ay*t*t;

ctx.fillStyle = "black";
ctx.fillRect(0,0,600,300);

ctx.fillStyle = "cyan";
ctx.beginPath();
ctx.arc(x*20+50, 250 - y*20, 5, 0, Math.PI*2);
ctx.fill();
}

function start() {
setInterval(() => {
t += dt;
draw();
}, 50);
}
</script>

</body>
</html>
