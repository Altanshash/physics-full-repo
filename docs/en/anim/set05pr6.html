<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>2D Field Animation</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #f4f7fb;
}

canvas {
  background: white;
  border: 2px solid black;
  margin-top: 20px;
}

button {
  padding: 10px;
  margin: 10px;
}
</style>
</head>

<body>

<h2>Electric Field Animation (3 Charges)</h2>

<canvas id="canvas" width="800" height="500"></canvas>

<div>
  <button onclick="start()">Start</button>
  <button onclick="stop()">Stop</button>
  <button onclick="reset()">Reset</button>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const k = 9e9;
const scale = 80;
const originX = canvas.width/2;
const originY = canvas.height/2;

let charges = [
  {q: 3e-6, x:-2, y:0},
  {q:-2e-6, x:2, y:0},
  {q: 2e-6, x:0, y:2}
];

// test particle
let p = {
  x: -1,
  y: 1,
  vx: 0,
  vy: 0
};

let running = false;

function toPx(x){ return originX + x*scale; }
function toPy(y){ return originY - y*scale; }

function field(x,y){
  let Ex=0, Ey=0;

  for(let c of charges){
    let dx = x - c.x;
    let dy = y - c.y;
    let r2 = dx*dx + dy*dy;

    if(r2 < 0.05) continue;

    let r = Math.sqrt(r2);
    let r3 = r2*r;

    Ex += k*c.q*dx/r3;
    Ey += k*c.q*dy/r3;
  }

  return {Ex,Ey};
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // draw charges
  for(let c of charges){
    ctx.beginPath();
    ctx.arc(toPx(c.x), toPy(c.y), 15, 0, Math.PI*2);
    ctx.fillStyle = c.q>0 ? "red":"blue";
    ctx.fill();

    ctx.fillStyle="white";
    ctx.fillText(c.q>0?"+":"-", toPx(c.x)-4, toPy(c.y)+4);
  }

  // draw particle
  ctx.beginPath();
  ctx.arc(toPx(p.x), toPy(p.y), 6, 0, Math.PI*2);
  ctx.fillStyle="black";
  ctx.fill();
}

function update(){
  let E = field(p.x,p.y);

  // simple physics
  let ax = E.Ex * 1e-6;
  let ay = E.Ey * 1e-6;

  p.vx += ax * 0.02;
  p.vy += ay * 0.02;

  p.x += p.vx * 0.02;
  p.y += p.vy * 0.02;
}

function animate(){
  if(!running) return;

  update();
  draw();

  requestAnimationFrame(animate);
}

function start(){
  running = true;
  animate();
}

function stop(){
  running = false;
}

function reset(){
  running = false;
  p = {x:-1, y:1, vx:0, vy:0};
  draw();
}

draw();
</script>

</body>
</html>
