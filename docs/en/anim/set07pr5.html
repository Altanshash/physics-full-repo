<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Problem 5 Animation</title>

<style>

body{
    background:#f5f5f5;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
}

button{
    padding:10px 20px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
}

svg{
    background:white;
    border:2px solid #ccc;
    margin-top:20px;
}

.wire{
    stroke:black;
    stroke-width:4;
    fill:none;
}

.resistor{
    fill:#eeeeee;
    stroke:black;
    stroke-width:3;
}

.label{
    font-size:18px;
    font-weight:bold;
}

.formula{
    font-size:22px;
    font-weight:bold;
    fill:darkblue;
}

.dot{
    fill:red;
    offset-path:path("M100 420 H180 V120 H700 V420 H820");
    offset-distance:0%;
}

.run{
    animation:move 6s linear infinite;
}

@keyframes move{
    to{
        offset-distance:100%;
    }
}

</style>
</head>

<body>

<h1>Problem 5 — Ammeter Current</h1>

<h2>Resistors: 5 Ω and 10 Ω</h2>

<button onclick="startAnimation()">Start</button>
<button onclick="stopAnimation()">Stop</button>

<svg width="950" height="650">

<!-- LEFT SIDE -->
<path class="wire"
d="M100 420 H180"/>

<path class="wire"
d="M180 420 V120"/>

<!-- TOP -->
<path class="wire"
d="M180 120 H700"/>

<!-- RIGHT -->
<path class="wire"
d="M700 120 V420"/>

<!-- BOTTOM -->
<path class="wire"
d="M180 420 H700"/>

<!-- OUTPUT -->
<path class="wire"
d="M700 420 H820"/>

<!-- MIDDLE BRANCH -->
<path class="wire"
d="M180 250 H420 H700"/>

<!-- LOWER INNER -->
<path class="wire"
d="M420 250 V350 H700"/>

<!-- RESISTORS -->

<!-- TOP -->
<rect class="resistor"
x="410" y="105"
width="90" height="30"/>

<!-- LEFT -->
<rect class="resistor"
x="280" y="235"
width="90" height="30"/>

<!-- CENTER -->
<rect class="resistor"
x="500" y="235"
width="90" height="30"/>

<!-- LOWER -->
<rect class="resistor"
x="500" y="335"
width="90" height="30"/>

<!-- AMMETER -->
<circle cx="700" cy="310"
r="28"
fill="white"
stroke="black"
stroke-width="3"/>

<text x="690" y="320"
font-size="28"
font-weight="bold">
A
</text>

<!-- LABELS -->
<text x="435" y="98" class="label">10 Ω</text>

<text x="305" y="228" class="label">5 Ω</text>

<text x="520" y="228" class="label">10 Ω</text>

<text x="520" y="328" class="label">10 Ω</text>

<!-- CONNECTION DOTS -->
<circle cx="180" cy="250" r="7"/>
<circle cx="420" cy="250" r="7"/>
<circle cx="700" cy="250" r="7"/>
<circle cx="700" cy="350" r="7"/>

<!-- CURRENT DOT -->
<circle id="dot"
class="dot"
r="10"/>

<!-- FORMULAS -->
<text x="40" y="520" class="formula">
R₃₄ = (10 × 10) / (10 + 10) = 5 Ω
</text>

<text x="40" y="560" class="formula">
R₁₃₄ = 5 + 5 = 10 Ω
</text>

<text x="40" y="600" class="formula">
Req = (10 × 10) / (10 + 10)
</text>

<text x="500" y="520" class="formula">
Req = 5 Ω
</text>

<text x="500" y="560" class="formula">
I = U / 5
</text>

<text x="500" y="600" class="formula">
IA = U / 10
</text>

</svg>

<script>

const dot = document.getElementById("dot");

function startAnimation(){
    dot.classList.add("run");
}

function stopAnimation(){
    dot.classList.remove("run");
}

</script>

</body>
</html>
