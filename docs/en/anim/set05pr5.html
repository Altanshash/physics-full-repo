<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Capacitor Energy and Force</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f7fb;
    text-align: center;
    margin: 0;
    padding: 20px;
  }

  canvas {
    background: white;
    border: 2px solid #222;
    border-radius: 8px;
    margin-top: 15px;
  }

  button {
    padding: 10px 18px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 6px;
  }

  .info {
    font-size: 17px;
    margin-top: 10px;
  }
</style>
</head>

<body>

<h2>Capacitor: Energy and Force Animation</h2>
<p>Parallel plate capacitor: electric field, energy density, and attractive force</p>

<canvas id="canvas" width="1000" height="540"></canvas>

<div>
  <button onclick="start()">Start</button>
  <button onclick="stop()">Stop</button>
  <button onclick="reset()">Reset</button>
</div>

<div class="info" id="info"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const eps0 = 8.85e-12;
const S = 0.02;
const d = 5e-3;
const Umax = 500;

const C = eps0 * S / d;

let U = 0;
let running = false;
let anim;

function values(U) {
  const E = U / d;
  const W = 0.5 * C * U * U;
  const w = 0.5 * eps0 * E * E;
  const F = 0.5 * eps0 * E * E * S;
  return { E, W, w, F };
}

function drawArrow(x1, y1, x2, y2, color) {
  const angle = Math.atan2(y2 - y1, x2 - x1);

  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = color;
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(
    x2 - 10 * Math.cos(angle - Math.PI / 6),
    y2 - 10 * Math.sin(angle - Math.PI / 6)
  );
  ctx.lineTo(
    x2 - 10 * Math.cos(angle + Math.PI / 6),
    y2 - 10 * Math.sin(angle + Math.PI / 6)
  );
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function currentFunction(label, u) {
  const val = values(u);

  if (label.includes("Energy")) return val.W;
  if (label.includes("Force")) return val.F;

  return val.E;
}

function drawGraph(x0, y0, width, height, label, formula, maxY, currentY) {
  ctx.strokeStyle = "#222";
  ctx.lineWidth = 2;

  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0, y0 - height);
  ctx.lineTo(x0 + width, y0 - height);
  ctx.stroke();

  ctx.fillStyle = "#111";
  ctx.font = "14px Arial";
  ctx.fillText(label, x0, y0 - height - 20);
  ctx.fillText(formula, x0, y0 - height - 5);
  ctx.fillText("U", x0 + width - 10, y0 + 18);

  ctx.beginPath();

  for (let i = 0; i <= width; i++) {
    const u = Umax * i / width;
    const val = currentFunction(label, u);
    const px = x0 + i;
    const py = y0 - (val / maxY) * height;

    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }

  ctx.strokeStyle = "#0066cc";
  ctx.lineWidth = 3;
  ctx.stroke();

  const currentX = x0 + (U / Umax) * width;
  const currentGraphY = y0 - (currentY / maxY) * height;

  ctx.beginPath();
  ctx.arc(currentX, currentGraphY, 5, 0, Math.PI * 2);
  ctx.fillStyle = "red";
  ctx.fill();
}

function drawCapacitor(E, F) {
  const left = 230;
  const right = 430;
  const top = 145;
  const bottom = 365;

  ctx.fillStyle = "#222";
  ctx.fillRect(left, top, 14, bottom - top);
  ctx.fillRect(right, top, 14, bottom - top);

  ctx.fillStyle = "#e74c3c";
  ctx.font = "24px Arial";
  ctx.fillText("+", left - 35, 265);

  ctx.fillStyle = "#2980b9";
  ctx.fillText("-", right + 35, 265);

  ctx.font = "15px Arial";
  ctx.fillStyle = "#111";
  ctx.fillText("Positive plate", left - 40, top - 25);
  ctx.fillText("Negative plate", right - 45, top - 25);

  for (let y = 170; y <= 340; y += 35) {
    drawArrow(left + 35, y, right - 20, y, "#27ae60");
  }

  ctx.fillStyle = "#111";
  ctx.font = "16px Arial";
  ctx.fillText("Electric field E", 255, 405);

  const forceLength = Math.min(70, 20 + (F / 8.85e-4) * 50);

  drawArrow(left - 70, 265, left - 70 + forceLength, 265, "#8e44ad");
  drawArrow(right + 90, 265, right + 90 - forceLength, 265, "#8e44ad");

  ctx.fillStyle = "#8e44ad";
  ctx.fillText("Attractive force", 260, 440);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const val = values(U);

  drawCapacitor(val.E, val.F);

  drawGraph(
    560,
    200,
    340,
    110,
    "Energy W",
    "W = 1/2 C U²",
    values(Umax).W,
    val.W
  );

  drawGraph(
    560,
    390,
    340,
    110,
    "Force F",
    "F = 1/2 ε₀ E² S",
    values(Umax).F,
    val.F
  );

  ctx.fillStyle = "#111";
  ctx.font = "16px Arial";

  ctx.fillText("Live values:", 40, 40);
  ctx.fillText("U = " + U.toFixed(1) + " V", 40, 70);
  ctx.fillText("C = " + C.toExponential(2) + " F", 40, 100);
  ctx.fillText("E = " + val.E.toExponential(2) + " V/m", 40, 130);
  ctx.fillText("W = " + val.W.toExponential(2) + " J", 40, 160);
  ctx.fillText("w = " + val.w.toExponential(2) + " J/m³", 40, 190);
  ctx.fillText("F = " + val.F.toExponential(2) + " N", 40, 220);

  document.getElementById("info").innerHTML =
    "At U = " + U.toFixed(1) + " V: " +
    "E = " + val.E.toExponential(2) + " V/m, " +
    "W = " + val.W.toExponential(2) + " J, " +
    "F = " + val.F.toExponential(2) + " N";
}

function animate() {
  if (!running) return;

  U += 2;

  if (U >= Umax) {
    U = Umax;
    running = false;
  }

  draw();
  anim = requestAnimationFrame(animate);
}

function start() {
  if (!running) {
    running = true;
    animate();
  }
}

function stop() {
  running = false;
  cancelAnimationFrame(anim);
}

function reset() {
  running = false;
  cancelAnimationFrame(anim);
  U = 0;
  draw();
}

draw();
</script>

</body>
</html>
