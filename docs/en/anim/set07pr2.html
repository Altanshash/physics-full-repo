<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Problem 2 Animation</title>

<style>

body{
    background:#f5f5f5;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
}

button{
    padding:10px 20px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
}

svg{
    background:white;
    border:2px solid #ccc;
    margin-top:20px;
}

.wire{
    stroke:black;
    stroke-width:4;
    fill:none;
}

.resistor{
    fill:#eeeeee;
    stroke:black;
    stroke-width:3;
}

.label{
    font-size:18px;
    font-weight:bold;
}

.formula{
    font-size:22px;
    font-weight:bold;
    fill:darkblue;
}

.dot{
    fill:red;
    offset-path:path("M50 360 H140 H260 V250 V120 H420 H580 V250 V360 H760");
    offset-distance:0%;
}

.run{
    animation:move 6s linear infinite;
}

@keyframes move{
    to{
        offset-distance:100%;
    }
}

</style>
</head>

<body>

<h1>Problem 2 — Equivalent Resistance</h1>

<h2>All resistors: R = 3 Ω</h2>

<button onclick="startAnimation()">Start</button>
<button onclick="stopAnimation()">Stop</button>

<svg width="900" height="550">

<!-- LEFT INPUT -->
<path class="wire"
d="M50 360 H140"/>

<!-- LEFT VERTICAL -->
<path class="wire"
d="M260 360 V250 V120"/>

<!-- TOP -->
<path class="wire"
d="M260 120 H580"/>

<!-- RIGHT VERTICAL -->
<path class="wire"
d="M580 120 V250 V360"/>

<!-- BOTTOM -->
<path class="wire"
d="M260 360 H420 H580"/>

<!-- OUTPUT -->
<path class="wire"
d="M580 360 H760"/>

<!-- MIDDLE -->
<path class="wire"
d="M260 250 H580"/>

<!-- RESISTORS -->

<!-- INPUT -->
<rect class="resistor"
x="140" y="345"
width="90" height="30"/>

<!-- LEFT TOP -->
<rect class="resistor"
x="245" y="160"
width="30" height="90"/>

<!-- LEFT BOTTOM -->
<rect class="resistor"
x="245" y="270"
width="30" height="90"/>

<!-- TOP -->
<rect class="resistor"
x="375" y="105"
width="90" height="30"/>

<!-- RIGHT TOP -->
<rect class="resistor"
x="565" y="160"
width="30" height="90"/>

<!-- RIGHT BOTTOM -->
<rect class="resistor"
x="565" y="270"
width="30" height="90"/>

<!-- CENTER -->
<rect class="resistor"
x="375" y="235"
width="90" height="30"/>

<!-- BOTTOM -->
<rect class="resistor"
x="375" y="345"
width="90" height="30"/>

<!-- LABELS -->
<text x="165" y="338" class="label">3 Ω</text>

<text x="215" y="210" class="label">3 Ω</text>
<text x="215" y="320" class="label">3 Ω</text>

<text x="400" y="98" class="label">3 Ω</text>

<text x="605" y="210" class="label">3 Ω</text>
<text x="605" y="320" class="label">3 Ω</text>

<text x="400" y="228" class="label">3 Ω</text>

<text x="400" y="338" class="label">3 Ω</text>

<!-- CONNECTION DOTS -->
<circle cx="260" cy="250" r="7"/>
<circle cx="580" cy="250" r="7"/>
<circle cx="260" cy="360" r="7"/>
<circle cx="580" cy="360" r="7"/>

<!-- CURRENT DOT -->
<circle id="dot"
class="dot"
r="10"/>

<!-- FORMULAS -->
<text x="40" y="450" class="formula">
All resistors = 3 Ω
</text>

<text x="40" y="485" class="formula">
Bridge part simplifies to:
</text>

<text x="40" y="520" class="formula">
Rbridge = 2.2 Ω
</text>

<text x="470" y="485" class="formula">
Req = 3 + 2.2
</text>

<text x="470" y="520" class="formula">
Req = 5.2 Ω
</text>

</svg>

<script>

const dot = document.getElementById("dot");

function startAnimation(){
    dot.classList.add("run");
}

function stopAnimation(){
    dot.classList.remove("run");
}

</script>

</body>
</html>
