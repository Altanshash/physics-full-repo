<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Problem 8 Animation</title>

<style>

body{
    background:#f5f5f5;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
}

button{
    padding:10px 20px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
}

svg{
    background:white;
    border:2px solid #ccc;
    margin-top:20px;
}

.wire{
    stroke:black;
    stroke-width:4;
    fill:none;
}

.resistor{
    fill:#eeeeee;
    stroke:black;
    stroke-width:3;
}

.label{
    font-size:20px;
    font-weight:bold;
}

.formula{
    font-size:22px;
    font-weight:bold;
    fill:darkblue;
}

.dot{
    fill:red;
    offset-path:path("M120 450 H220 V150 H700 V450 H820");
    offset-distance:0%;
}

.run{
    animation:move 7s linear infinite;
}

@keyframes move{
    to{
        offset-distance:100%;
    }
}

</style>
</head>

<body>

<h1>Problem 8 — Ammeter Current</h1>

<h2>Series Circuit with Two Batteries</h2>

<button onclick="startAnimation()">Start</button>
<button onclick="stopAnimation()">Stop</button>

<svg width="950" height="700">

<!-- MAIN WIRES -->

<!-- LEFT -->
<path class="wire"
d="M120 450 H220"/>

<!-- LEFT SIDE -->
<path class="wire"
d="M220 450 V150"/>

<!-- TOP -->
<path class="wire"
d="M220 150 H700"/>

<!-- RIGHT -->
<path class="wire"
d="M700 150 V450"/>

<!-- BOTTOM -->
<path class="wire"
d="M220 450 H700"/>

<!-- OUTPUT -->
<path class="wire"
d="M700 450 H820"/>

<!-- BATTERY 1 -->
<line x1="320" y1="120" x2="320" y2="180"
stroke="black"
stroke-width="4"/>

<line x1="350" y1="130" x2="350" y2="170"
stroke="black"
stroke-width="8"/>

<!-- BATTERY 2 -->
<line x1="320" y1="420" x2="320" y2="480"
stroke="black"
stroke-width="8"/>

<line x1="350" y1="430" x2="350" y2="470"
stroke="black"
stroke-width="4"/>

<!-- RESISTORS -->

<!-- TOP INTERNAL -->
<rect class="resistor"
x="390" y="135"
width="70" height="30"/>

<!-- R1 -->
<rect class="resistor"
x="520" y="135"
width="90" height="30"/>

<!-- RIGHT -->
<rect class="resistor"
x="685" y="260"
width="30" height="90"/>

<!-- LEFT -->
<rect class="resistor"
x="205" y="260"
width="30" height="90"/>

<!-- BOTTOM INTERNAL -->
<rect class="resistor"
x="390" y="435"
width="70" height="30"/>

<!-- AMMETER -->
<circle cx="560" cy="450"
r="28"
fill="white"
stroke="black"
stroke-width="3"/>

<text x="550" y="460"
font-size="28"
font-weight="bold">
A
</text>

<!-- LABELS -->
<text x="280" y="105" class="label">E₁ = 4.5 V</text>

<text x="280" y="540" class="label">E₂ = 1.5 V</text>

<text x="405" y="128" class="label">rw = 1 Ω</text>

<text x="535" y="128" class="label">R₁ = 20 Ω</text>

<text x="735" y="315" class="label">R₂ = 40 Ω</text>

<text x="120" y="315" class="label">R₃ = 60 Ω</text>

<text x="405" y="428" class="label">rw = 1 Ω</text>

<!-- CURRENT DOT -->
<circle id="dot"
class="dot"
r="10"/>

<!-- FORMULAS -->
<text x="40" y="590" class="formula">
Req = 20 + 40 + 60 + 1 + 1
</text>

<text x="40" y="625" class="formula">
Req = 122 Ω
</text>

<text x="40" y="660" class="formula">
Eeq = 4.5 − 1.5 = 3 V
</text>

<text x="500" y="590" class="formula">
I = Eeq / Req
</text>

<text x="500" y="625" class="formula">
I = 3 / 122
</text>

<text x="500" y="660" class="formula">
I = 0.025 A
</text>

</svg>

<script>

const dot = document.getElementById("dot");

function startAnimation(){
    dot.classList.add("run");
}

function stopAnimation(){
    dot.classList.remove("run");
}

</script>

</body>
</html>
