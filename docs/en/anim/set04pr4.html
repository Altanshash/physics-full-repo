<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wave Equation Animation</title>
<style>
  body { text-align: center; font-family: Arial; background: #f4f4f4; }
  canvas { background: white; border: 1px solid black; }
  button { margin: 10px; padding: 10px 20px; font-size: 16px; }
</style>
</head>
<body>

<h2>Wave Equation Animation</h2>
<p>y(x,t) = A cos(kx − ωt)</p>
<p>k = 4π, ω = 20π → v = 5</p>

<canvas id="canvas" width="800" height="300"></canvas><br>

<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let t = 0;
let animation;

const A = 50;
const k = 4 * Math.PI;
const w = 20 * Math.PI;

const scale = 200;
const v = 5;

function drawAxes() {
  ctx.strokeStyle = "black";

  // X axis
  ctx.beginPath();
  ctx.moveTo(0, 150);
  ctx.lineTo(800, 150);
  ctx.stroke();

  // X numbers
  for (let i = 0; i <= 4; i++) {
    let x = i * 0.5;
    let px = x * scale;
    ctx.fillText(x.toFixed(1), px, 170);
  }

  // Y labels
  ctx.fillText("A", 5, 100);
  ctx.fillText("0", 5, 155);
  ctx.fillText("-A", 5, 200);
}

function drawWave() {
  ctx.beginPath();

  for (let px = 0; px < canvas.width; px++) {
    let x = px / scale;
    let y = A * Math.cos(k * x - w * t / 100);
    ctx.lineTo(px, 150 - y);
  }

  ctx.strokeStyle = "blue";
  ctx.stroke();
}

function drawVelocityArrow() {
  ctx.strokeStyle = "red";
  ctx.fillStyle = "red";

  // arrow line
  ctx.beginPath();
  ctx.moveTo(600, 50);
  ctx.lineTo(700, 50);
  ctx.stroke();

  // arrow head
  ctx.beginPath();
  ctx.moveTo(700, 50);
  ctx.lineTo(690, 45);
  ctx.lineTo(690, 55);
  ctx.fill();

  ctx.fillText("v = 5", 620, 40);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawAxes();
  drawWave();
  drawVelocityArrow();

  t++;
}

function start() {
  if (!animation) {
    animation = setInterval(draw, 30);
  }
}

function stop() {
  clearInterval(animation);
  animation = null;
}
</script>

</body>
</html>
