<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coulomb Force Animation</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    background: #f0f4f8;
  }

  canvas {
    background: white;
    border: 2px solid #333;
    margin-top: 20px;
  }

  button {
    padding: 10px 15px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>

<body>

<h2>Coulomb's Force Animation</h2>
<p>Opposite charges attract each other</p>

<canvas id="canvas" width="700" height="350"></canvas>

<div>
  <button onclick="start()">Start</button>
  <button onclick="stop()">Stop</button>
  <button onclick="reset()">Reset</button>
</div>

<p id="info"></p>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const k = 9e9;
const q1 = 3e-6;
const q2 = -5e-6;

let x1 = 200;
let y1 = 175;

let x2 = 500;
let y2 = 175;

let running = false;
let anim;

function distance() {
  let dx = x2 - x1;
  let dy = y2 - y1;
  return Math.sqrt(dx*dx + dy*dy);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let dx = x2 - x1;
  let dy = y2 - y1;
  let r = distance();

  let F = k * Math.abs(q1*q2) / (r*r);

  // line
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = "#555";
  ctx.stroke();

  // q1
  ctx.beginPath();
  ctx.arc(x1, y1, 25, 0, Math.PI*2);
  ctx.fillStyle = "red";
  ctx.fill();
  ctx.fillStyle = "black";
  ctx.fillText("q1 (+)", x1-20, y1-35);

  // q2
  ctx.beginPath();
  ctx.arc(x2, y2, 25, 0, Math.PI*2);
  ctx.fillStyle = "blue";
  ctx.fill();
  ctx.fillStyle = "black";
  ctx.fillText("q2 (-)", x2-20, y2-35);

  // force arrow (toward q1)
  let angle = Math.atan2(dy, dx);

  drawArrow(x2, y2, x2 - 60*Math.cos(angle), y2 - 60*Math.sin(angle));

  document.getElementById("info").innerHTML =
    "Distance ≈ " + (r/100).toFixed(2) + " m | Force ∝ " + F.toExponential(2);
}

function drawArrow(x1,y1,x2,y2) {
  let head = 10;
  let angle = Math.atan2(y2-y1,x2-x1);

  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.strokeStyle="green";
  ctx.lineWidth=3;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x2,y2);
  ctx.lineTo(x2-head*Math.cos(angle-Math.PI/6), y2-head*Math.sin(angle-Math.PI/6));
  ctx.lineTo(x2-head*Math.cos(angle+Math.PI/6), y2-head*Math.sin(angle+Math.PI/6));
  ctx.closePath();
  ctx.fillStyle="green";
  ctx.fill();
}

function animate() {
  if (!running) return;

  let dx = x1 - x2;
  let dy = y1 - y2;

  x2 += dx * 0.01;
  y2 += dy * 0.01;

  if (distance() < 50) running = false;

  draw();
  anim = requestAnimationFrame(animate);
}

function start() {
  if (!running) {
    running = true;
    animate();
  }
}

function stop() {
  running = false;
  cancelAnimationFrame(anim);
}

function reset() {
  running = false;
  cancelAnimationFrame(anim);
  x2 = 500;
  y2 = 175;
  draw();
}

draw();
</script>

</body>
</html>
