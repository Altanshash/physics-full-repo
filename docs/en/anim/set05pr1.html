<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Electric Potential Animation</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f8fb;
    text-align: center;
    padding: 20px;
  }

  canvas {
    background: white;
    border: 2px solid #333;
    margin-top: 15px;
  }

  button {
    padding: 10px 18px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
  }

  .info {
    font-size: 18px;
    margin-top: 15px;
  }
</style>
</head>

<body>

<h2>Electric Potential and Electric Field Animation</h2>

<p>
A test charge moves from <b>r = 0.3 m</b> to <b>r = 0.6 m</b>.
</p>

<canvas id="canvas" width="800" height="350"></canvas>

<div>
  <button onclick="startAnimation()">Start</button>
  <button onclick="stopAnimation()">Stop</button>
  <button onclick="resetAnimation()">Reset</button>
</div>

<div class="info">
  <p id="distance"></p>
  <p id="potential"></p>
  <p id="field"></p>
  <p id="work"></p>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const k = 9e9;
const q = 4e-6;
const q0 = 2e-6;

let r = 0.3;
let animationId = null;
let running = false;

const rMin = 0.3;
const rMax = 0.6;

function mapRtoX(r) {
  return 250 + (r - rMin) / (rMax - rMin) * 350;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const chargeX = 200;
  const chargeY = 170;

  const testX = mapRtoX(r);
  const testY = 170;

  const V = k * q / r;
  const E = k * q / (r * r);
  const V1 = k * q / rMin;
  const W = q0 * (V - V1);

  // line
  ctx.beginPath();
  ctx.moveTo(chargeX, chargeY);
  ctx.lineTo(testX, testY);
  ctx.strokeStyle = "#555";
  ctx.lineWidth = 3;
  ctx.stroke();

  // source charge
  ctx.beginPath();
  ctx.arc(chargeX, chargeY, 30, 0, Math.PI * 2);
  ctx.fillStyle = "#ff6666";
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = "black";
  ctx.font = "18px Arial";
  ctx.fillText("q = 4 μC", chargeX - 35, chargeY - 45);

  // test charge
  ctx.beginPath();
  ctx.arc(testX, testY, 20, 0, Math.PI * 2);
  ctx.fillStyle = "#66aaff";
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = "black";
  ctx.fillText("q₀ = 2 μC", testX - 35, testY - 35);

  // electric field arrows
  for (let i = 0; i < 5; i++) {
    let x = chargeX + 60 + i * 75;
    drawArrow(x, 250, x + 45, 250);
  }

  ctx.fillText("Electric field direction", 310, 285);

  // distance labels
  ctx.fillText("0.3 m", 250, 130);
  ctx.fillText("0.6 m", 600, 130);

  // update text
  document.getElementById("distance").innerHTML =
    "Distance: r = " + r.toFixed(3) + " m";

  document.getElementById("potential").innerHTML =
    "Potential: V = " + V.toFixed(0) + " V";

  document.getElementById("field").innerHTML =
    "Electric field: E = " + E.toExponential(2) + " N/C";

  document.getElementById("work").innerHTML =
    "Work from 0.3 m: W = " + W.toFixed(3) + " J";
}

function drawArrow(x1, y1, x2, y2) {
  const headLength = 10;
  const angle = Math.atan2(y2 - y1, x2 - x1);

  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = "#008000";
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x2, y2);
  ctx.lineTo(
    x2 - headLength * Math.cos(angle - Math.PI / 6),
    y2 - headLength * Math.sin(angle - Math.PI / 6)
  );
  ctx.lineTo(
    x2 - headLength * Math.cos(angle + Math.PI / 6),
    y2 - headLength * Math.sin(angle + Math.PI / 6)
  );
  ctx.lineTo(x2, y2);
  ctx.fillStyle = "#008000";
  ctx.fill();
}

function animate() {
  if (!running) return;

  r += 0.001;

  if (r >= rMax) {
    r = rMax;
    running = false;
  }

  draw();
  animationId = requestAnimationFrame(animate);
}

function startAnimation() {
  if (!running) {
    running = true;
    animate();
  }
}

function stopAnimation() {
  running = false;
  cancelAnimationFrame(animationId);
}

function resetAnimation() {
  running = false;
  cancelAnimationFrame(animationId);
  r = rMin;
  draw();
}

draw();
</script>

</body>
</html>
