<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Problem 9 Animation</title>

<style>

body{
    background:#f5f5f5;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
}

button{
    padding:10px 20px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
}

svg{
    background:white;
    border:2px solid #ccc;
    margin-top:20px;
}

.wire{
    stroke:black;
    stroke-width:4;
    fill:none;
}

.resistor{
    fill:#eeeeee;
    stroke:black;
    stroke-width:3;
}

.label{
    font-size:20px;
    font-weight:bold;
}

.formula{
    font-size:22px;
    font-weight:bold;
    fill:darkblue;
}

.dot{
    fill:red;
    offset-path:path("M120 500 H220 V160 H620 V500 H820");
    offset-distance:0%;
}

.run{
    animation:move 7s linear infinite;
}

@keyframes move{
    to{
        offset-distance:100%;
    }
}

</style>
</head>

<body>

<h1>Problem 9 — Ammeter Current</h1>

<h2>Two Sources Circuit</h2>

<button onclick="startAnimation()">Start</button>
<button onclick="stopAnimation()">Stop</button>

<svg width="950" height="720">

<!-- MAIN WIRES -->

<!-- LEFT -->
<path class="wire"
d="M120 500 H220"/>

<!-- LEFT SIDE -->
<path class="wire"
d="M220 500 V160"/>

<!-- TOP -->
<path class="wire"
d="M220 160 H620"/>

<!-- RIGHT -->
<path class="wire"
d="M620 160 V500"/>

<!-- BOTTOM -->
<path class="wire"
d="M220 500 H620"/>

<!-- OUTPUT -->
<path class="wire"
d="M620 500 H820"/>

<!-- INNER LOOP -->
<path class="wire"
d="M220 320 H420 H620"/>

<!-- BATTERY E2 -->
<line x1="300" y1="130" x2="300" y2="190"
stroke="black"
stroke-width="8"/>

<line x1="330" y1="140" x2="330" y2="180"
stroke="black"
stroke-width="4"/>

<!-- BATTERY E1 -->
<line x1="300" y1="470" x2="300" y2="530"
stroke="black"
stroke-width="8"/>

<line x1="330" y1="480" x2="330" y2="520"
stroke="black"
stroke-width="4"/>

<!-- RESISTORS -->

<!-- TOP INTERNAL -->
<rect class="resistor"
x="420" y="145"
width="70" height="30"/>

<!-- RIGHT -->
<rect class="resistor"
x="605" y="300"
width="30" height="90"/>

<!-- INNER -->
<rect class="resistor"
x="420" y="305"
width="90" height="30"/>

<!-- BOTTOM INTERNAL -->
<rect class="resistor"
x="420" y="485"
width="70" height="30"/>

<!-- AMMETER -->
<circle cx="220" cy="320"
r="28"
fill="white"
stroke="black"
stroke-width="3"/>

<text x="210" y="330"
font-size="28"
font-weight="bold">
A
</text>

<!-- LABELS -->
<text x="250" y="110" class="label">E₂ = 4.5 V</text>

<text x="250" y="610" class="label">E₁ = 9 V</text>

<text x="430" y="138" class="label">rw = 1 Ω</text>

<text x="655" y="350" class="label">R₁ = 10 Ω</text>

<text x="430" y="298" class="label">R₂ = 20 Ω</text>

<text x="430" y="478" class="label">rw = 1 Ω</text>

<!-- CURRENT DOT -->
<circle id="dot"
class="dot"
r="10"/>

<!-- FORMULAS -->
<text x="40" y="610" class="formula">
Req = 10 + 20 + 1 + 1
</text>

<text x="40" y="645" class="formula">
Req = 32 Ω
</text>

<text x="40" y="680" class="formula">
Eeq = 9 − 4.5 = 4.5 V
</text>

<text x="500" y="610" class="formula">
I = Eeq / Req
</text>

<text x="500" y="645" class="formula">
I = 4.5 / 32
</text>

<text x="500" y="680" class="formula">
I = 0.141 A
</text>

</svg>

<script>

const dot = document.getElementById("dot");

function startAnimation(){
    dot.classList.add("run");
}

function stopAnimation(){
    dot.classList.remove("run");
}

</script>

</body>
</html>
