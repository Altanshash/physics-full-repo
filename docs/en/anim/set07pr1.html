<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Equivalent Resistance Animation</title>

<style>

body{
    background:#f5f5f5;
    font-family:Arial;
    text-align:center;
}

h1{
    margin-top:20px;
}

button{
    padding:10px 20px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
}

svg{
    background:white;
    border:2px solid #ccc;
    margin-top:20px;
}

.wire{
    stroke:black;
    stroke-width:4;
    fill:none;
}

.resistor{
    fill:#eeeeee;
    stroke:black;
    stroke-width:3;
}

.label{
    font-size:18px;
    font-weight:bold;
}

.formula{
    font-size:22px;
    font-weight:bold;
    fill:darkblue;
}

.dot{
    fill:red;
    offset-path:path("M60 210 H120 V110 H430 V210 H650 H840");
    offset-distance:0%;
}

.run{
    animation:move 5s linear infinite;
}

@keyframes move{
    to{
        offset-distance:100%;
    }
}

</style>
</head>

<body>

<h1>Problem 1 — Equivalent Resistance</h1>

<h2>All resistors: R = 5 Ω</h2>

<button onclick="startAnimation()">Start</button>
<button onclick="stopAnimation()">Stop</button>

<svg width="900" height="500">

<!-- TOP BRANCH -->
<path class="wire"
d="M60 210 H120 V110 H430 V210 H520"/>

<!-- BOTTOM BRANCH -->
<path class="wire"
d="M120 210 V310 H240"/>

<path class="wire"
d="M340 310 H430 V210"/>

<!-- LOWER PARALLEL -->
<path class="wire"
d="M240 310 V360 H340 V310"/>

<!-- RIGHT SIDE -->
<path class="wire"
d="M520 210 H650"/>

<path class="wire"
d="M750 210 H840"/>

<!-- CONNECTION DOTS -->
<circle cx="120" cy="210" r="7"/>
<circle cx="430" cy="210" r="7"/>
<circle cx="240" cy="310" r="7"/>
<circle cx="340" cy="310" r="7"/>

<!-- RESISTORS -->

<!-- TOP -->
<rect class="resistor"
x="170" y="95"
width="80" height="30"/>

<rect class="resistor"
x="310" y="95"
width="80" height="30"/>

<!-- BOTTOM -->
<rect class="resistor"
x="170" y="295"
width="80" height="30"/>

<rect class="resistor"
x="270" y="295"
width="80" height="30"/>

<!-- LOWER -->
<rect class="resistor"
x="270" y="345"
width="80" height="30"/>

<!-- FINAL -->
<rect class="resistor"
x="650" y="195"
width="100" height="30"/>

<!-- LABELS -->
<text x="190" y="90" class="label">5 Ω</text>
<text x="330" y="90" class="label">5 Ω</text>

<text x="190" y="290" class="label">5 Ω</text>
<text x="290" y="290" class="label">5 Ω</text>

<text x="290" y="340" class="label">5 Ω</text>

<text x="685" y="190" class="label">5 Ω</text>

<!-- CURRENT DOT -->
<circle id="dot"
class="dot"
r="10"/>

<!-- FORMULAS -->

<text x="40" y="430" class="formula">
R₁ = 5 + 5 = 10 Ω
</text>

<text x="40" y="460" class="formula">
Rp = (5 × 5) / (5 + 5) = 2.5 Ω
</text>

<text x="40" y="490" class="formula">
R₂ = 5 + 2.5 = 7.5 Ω
</text>

<text x="470" y="430" class="formula">
R₁₂ = (10 × 7.5) / (10 + 7.5)
</text>

<text x="470" y="460" class="formula">
R₁₂ = 75 / 17.5 = 4.29 Ω
</text>

<text x="470" y="490" class="formula">
Req = 4.29 + 5 = 9.29 Ω
</text>

</svg>

<script>

const dot = document.getElementById("dot");

function startAnimation(){
    dot.classList.add("run");
}

function stopAnimation(){
    dot.classList.remove("run");
}

</script>

</body>
</html>
